apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supplychain-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nawinfk/supplychain-platform
    targetRevision: main
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: supplychain
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
