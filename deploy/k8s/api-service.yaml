apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: supplychain
  labels:
    app: api-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      serviceAccountName: supplychain-platform
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api-service
          image: 402275401431.dkr.ecr.us-east-1.amazonaws.com/supplychain-platform/api-service:v3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: supplychain-config
            - secretRef:
                name: supplychain-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: supplychain
spec:
  selector:
    app: api-service
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
