apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-worker
  namespace: supplychain
  labels:
    app: risk-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-worker
  template:
    metadata:
      labels:
        app: risk-worker
    spec:
      serviceAccountName: supplychain-platform
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
      containers:
        - name: risk-worker
          image: 402275401431.dkr.ecr.us-east-1.amazonaws.com/supplychain-platform/risk-worker:v2
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: supplychain-config
            - secretRef:
                name: supplychain-secrets
          readinessProbe:
            exec:
              command: ["python", "-c", "import os; os.kill(1, 0)"]
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            exec:
              command: ["python", "-c", "import os; os.kill(1, 0)"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
