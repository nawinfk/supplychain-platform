apiVersion: apps/v1
kind: Deployment
metadata:
  name: vessel-consumer-worker
  namespace: supplychain
  labels:
    app: vessel-consumer-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vessel-consumer-worker
  template:
    metadata:
      labels:
        app: vessel-consumer-worker
    spec:
      serviceAccountName: supplychain-platform
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
      containers:
        - name: vessel-consumer-worker
          image: ghcr.io/nawinfk/supplychain-platform/vessel-consumer-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: supplychain-config
            - secretRef:
                name: supplychain-secrets
          readinessProbe:
            exec:
              command: ["python", "-c", "import os; os.kill(1, 0)"]
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            exec:
              command: ["python", "-c", "import os; os.kill(1, 0)"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
