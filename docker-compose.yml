services:
  postgres:
    image: postgres:16
    container_name: supplychain-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supplychain}
      POSTGRES_USER: ${POSTGRES_USER:-supplychain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supplychain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
